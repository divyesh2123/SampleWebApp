name: Deploy React to IIS (EC2 FINAL)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: myapp   # 👈 CHANGE if your app folder name is different

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.19.0'

      - name: Verify Node
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: |
          echo "Installing dependencies..."
          npm install

      - name: Build React app
        run: |
          echo "Building app..."
          npm run build

      - name: Verify build output
        run: |
          echo "Listing files..."
          dir

      - name: Deploy to EC2 via WinRM (HTTP - FINAL FIX)
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          Write-Host "===== START DEPLOYMENT ====="

          # ✅ FIX: Enable WinRM client settings on GitHub runner
          Write-Host "Configuring WinRM client..."
          winrm set winrm/config/client '@{AllowUnencrypted="true"}'
          winrm set winrm/config/client/auth '@{Basic="true"}'

          $username = "${{ secrets.EC2_USERNAME }}"
          $passwordPlain = "${{ secrets.EC2_PASSWORD }}"
          $hostName = "${{ secrets.EC2_HOST }}"

          Write-Host "Connecting to: $hostName"

          $password = $passwordPlain | ConvertTo-SecureString -AsPlainText -Force
          $cred = New-Object System.Management.Automation.PSCredential($username, $password)

          try {
              Write-Host "Creating session..."
              $session = New-PSSession `
                -ComputerName $hostName `
                -Credential $cred `
                -Authentication Basic `
                -Port 5985

              Write-Host "✅ Session created"
          }
          catch {
              Write-Host "❌ Session creation failed"
              Write-Host $_
              exit 1
          }

          try {
              Write-Host "Testing connection..."
              Invoke-Command -Session $session -ScriptBlock {
                  hostname
              }

              Write-Host "Cleaning IIS folder..."
              Invoke-Command -Session $session -ScriptBlock {
                  if (Test-Path "C:\inetpub\wwwroot\*") {
                      Remove-Item -Recurse -Force "C:\inetpub\wwwroot\*" -ErrorAction SilentlyContinue
                  }
              }

              Write-Host "Copying build files..."
              Copy-Item -Path "build\*" `
                -Destination "C:\inetpub\wwwroot" `
                -Recurse `
                -ToSession $session

              Write-Host "Restarting IIS..."
              Invoke-Command -Session $session -ScriptBlock {
                  iisreset
              }

              Write-Host "✅ Deployment successful"
          }
          catch {
              Write-Host "❌ Deployment failed"
              Write-Host $_
              exit 1
          }

          Remove-PSSession $session

          Write-Host "===== DONE ====="
