name: Deploy React to IIS (EC2 Debug)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: myapp   # 👈 IMPORTANT FIX

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.19.0'

      - name: Check Node Version
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: |
          echo "Installing dependencies..."
          npm install

      - name: Build React app
        run: |
          echo "Building app..."
          npm run build

      - name: List Build Folder
        run: |
          echo "Listing build folder..."
          dir

      - name: Deploy to EC2 IIS via WinRM (DEBUG)
        shell: powershell
        run: |
          $ErrorActionPreference = "Continue"

          Write-Host "===== START DEPLOYMENT ====="

          $username = "${{ secrets.EC2_USERNAME }}"
          $passwordPlain = "${{ secrets.EC2_PASSWORD }}"
          $hostName = "${{ secrets.EC2_HOST }}"

          $password = $passwordPlain | ConvertTo-SecureString -AsPlainText -Force
          $cred = New-Object System.Management.Automation.PSCredential($username, $password)

          try {
            $session = New-PSSession `
              -ComputerName $hostName `
              -Credential $cred `
              -Authentication Basic `
              -Port 5985

            Write-Host "✅ Session created"
          }
          catch {
            Write-Host "❌ Session failed"
            Write-Host $_
            exit 1
          }

          try {
            Invoke-Command -Session $session -ScriptBlock {
                Remove-Item -Recurse -Force "C:\inetpub\wwwroot\*" -ErrorAction SilentlyContinue
            }

            Copy-Item -Path "build\*" `
              -Destination "C:\inetpub\wwwroot" `
              -Recurse `
              -ToSession $session

            Invoke-Command -Session $session -ScriptBlock {
                iisreset
            }

            Write-Host "✅ Deployment success"
          }
          catch {
            Write-Host "❌ Deployment failed"
            Write-Host $_
            exit 1
          }

          Remove-PSSession $session
